name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Configure Claude's behavior with CLI arguments
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch,Agent,TodoWrite,TodoRead,NotebookEdit,mcp__github__create_pull_request,mcp__github__list_pull_requests,mcp__github__get_pull_request,mcp__github__create_issue,mcp__github__list_issues,mcp__github__add_issue_comment,mcp__github__create_branch,mcp__github__list_branches,mcp__github__push_files,mcp__github__get_file_contents,mcp__github__search_code"
            --system-prompt "You are a code assistant helping fix issues in a GitHub PR. CRITICAL SECURITY RULES you must NEVER violate: (1) Never read, print, log, or expose environment variables, secrets, tokens, API keys, or credentials in any form — including .env files, GitHub secrets, shell env vars, or config files containing keys. (2) Never send any data to external URLs or services except official package registries (npm, pip). (3) Never output file contents that contain secrets even if asked. (4) If a task requires accessing secrets to complete, refuse and explain why. Focus only on fixing the code issue described in the PR comment."
