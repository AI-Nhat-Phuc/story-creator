name: E2E Tests

# Runs on every push and PR using local servers (no Vercel dependency).
# The existing playwright-e2e.yml handles post-Vercel-deployment runs.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: Playwright E2E (local)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Tell playwright.config.cjs where the local frontend lives.
      BASE_URL: 'http://localhost:3000'
      # Required by AuthService in non-development envs.
      JWT_SECRET_KEY: 'ci-e2e-secret-not-for-production'
      # Seeds the admin account on first backend request.
      INITIAL_ADMIN_PASSWORD: 'Admin@123'
      # Keeps Flask from requiring a prod-grade JWT secret.
      FLASK_ENV: 'development'
      # Seed the testuser account via the backend's built-in seeding hook.
      SEED_TEST_USER: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      # ── Start servers ─────────────────────────────────────────────────────

      - name: Start Flask backend (port 5000)
        run: python api/main.py -i api &

      - name: Wait for Flask backend to be ready
        run: |
          echo "Waiting for Flask API on :5000…"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "  ✓ backend ready (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — sleeping 2s"
            sleep 2
          done
          echo "Backend did not become ready in time" >&2
          exit 1

      - name: Start Next.js dev server (port 3000)
        # NODE_ENV=development ensures next.config.js rewrites /api/* → :5000
        run: NODE_ENV=development npm run dev:frontend &

      - name: Wait for Next.js frontend to be ready
        run: |
          echo "Waiting for Next.js on :3000…"
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "  ✓ frontend ready (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/40 — sleeping 3s"
            sleep 3
          done
          echo "Frontend did not become ready in time" >&2
          exit 1

      # ── Run tests ─────────────────────────────────────────────────────────

      - name: Run Playwright E2E tests
        run: npx playwright test --config=playwright.config.cjs

      # ── Artifacts ─────────────────────────────────────────────────────────

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots and videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      # ── PR comment on failure ─────────────────────────────────────────────

      - name: Comment failures on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const MARKER = '<!-- e2e-local-failure -->'
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const prNumber = context.payload.pull_request?.number
            if (!prNumber) { console.log('No PR number — skipping comment'); return }

            let failedSection = ''
            const resultsPath = 'test-results/results.json'
            if (!fs.existsSync(resultsPath)) {
              failedSection = `_No \`results.json\` found — a setup step failed before tests ran. Check the [job log](${runUrl})._`
            } else {
              try {
                const report = JSON.parse(fs.readFileSync(resultsPath, 'utf8'))
                const BAD = new Set(['failed', 'timedOut', 'interrupted'])
                const stripAnsi = s => s.replace(/\[[0-9;]*m/g, '')
                const failures = []
                const walk = (suite, crumbs = []) => {
                  const trail = suite.title ? [...crumbs, suite.title] : crumbs
                  for (const spec of (suite.specs || [])) {
                    const bad = (spec.tests || []).flatMap(t => t.results || []).filter(r => BAD.has(r.status))
                    if (!bad.length) continue
                    const w = bad[0]
                    failures.push({ path: [...trail, spec.title].join(' › '), status: w.status, message: stripAnsi(w.error?.message || w.status) })
                  }
                  for (const child of (suite.suites || [])) walk(child, trail)
                }
                for (const s of (report.suites || [])) walk(s)
                if (failures.length === 0) {
                  failedSection = `_Setup failed before tests ran — check the [job log](${runUrl})._`
                } else {
                  const icon = s => s === 'timedOut' ? '⏱️' : s === 'interrupted' ? '🚫' : '❌'
                  failedSection = `### ${failures.length} test(s) failed\n\n` +
                    failures.map(f => `**\`${f.path}\`** ${icon(f.status)}\n\`\`\`\n${f.message.slice(0, 600)}\n\`\`\``).join('\n\n---\n\n')
                }
              } catch (e) {
                failedSection = `_Could not parse results: ${e.message}_`
              }
            }

            // Delete previous failure comments from this workflow
            const comments = await github.paginate(github.rest.issues.listComments, { owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, per_page: 100 })
            for (const c of comments) {
              if (c.body?.includes(MARKER)) {
                await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id })
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
              body: [MARKER, '## ❌ E2E Tests Failed (local)', '', `**Run:** [Logs & artifacts](${runUrl})`, '', failedSection, '', '> Screenshots and videos are attached as artifacts on the Actions run.'].join('\n')
            })

      - name: Clear failure comment when E2E passes
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- e2e-local-failure -->'
            const prNumber = context.payload.pull_request?.number
            if (!prNumber) return
            const comments = await github.paginate(github.rest.issues.listComments, { owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, per_page: 100 })
            for (const c of comments) {
              if (c.body?.includes(MARKER)) {
                await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id })
              }
            }
