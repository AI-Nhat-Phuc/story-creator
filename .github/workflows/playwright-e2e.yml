name: Playwright E2E Tests

# Runs in two modes:
#
#   pull_request         → waits for the Vercel preview to finish deploying,
#                          then tests against that URL (same as mode 2).
#
#   deployment_status    → fires automatically once Vercel marks the preview
#                          deployment successful (original behaviour).
#
# In both modes the tests hit the real Vercel server — no local servers are started.
#
# REQUIRED secret (repo Settings → Secrets and variables → Actions):
#   VERCEL_AUTOMATION_BYPASS_SECRET
#   → Vercel dashboard → Project → Settings → Deployment Protection
#     → Enable "Protection Bypass for Automation" → copy the secret
on:
  pull_request:
  deployment_status:

permissions:
  contents: read
  pull-requests: write
  issues: write

# Both pull_request and deployment_status fire for the same commit.
# Group by SHA so the second run (deployment_status, which already has the
# Vercel URL) cancels the still-waiting pull_request run automatically.
concurrency:
  group: e2e-${{ github.event.pull_request.head.sha || github.event.deployment.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run E2E tests
    # deployment_status: only successful Vercel preview deploys.
    # pull_request: always run (we wait for Vercel inside the job).
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment != 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout the deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'deployment_status' && github.event.deployment.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── Wait for Vercel (pull_request only) ────────────────────────────────
      # For deployment_status the deployment is already successful — skip these.

      - name: Wait for Vercel check to finish
        if: github.event_name != 'deployment_status'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-regexp: '^Vercel.*'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success,skipped,neutral

      - name: Get Vercel preview URL from GitHub Deployments
        if: github.event_name != 'deployment_status'
        id: get-url
        uses: actions/github-script@v7
        with:
          script: |
            // Vercel registers a GitHub Deployment for every preview build.
            // After the Vercel check succeeds above, a successful deployment
            // status with an environment_url should already exist.
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              per_page: 10,
            })

            for (const dep of deployments) {
              // Skip production deployments
              if (dep.environment.toLowerCase() === 'production') continue

              const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: dep.id,
                per_page: 5,
              })
              const ok = statuses.find(s => s.state === 'success' && s.environment_url)
              if (ok) {
                console.log(`Vercel preview URL: ${ok.environment_url}`)
                core.setOutput('url', ok.environment_url)
                return
              }
            }
            core.setFailed(
              'No successful Vercel preview deployment found for commit ' + context.sha +
              '. Make sure the Vercel GitHub integration is enabled and creates GitHub Deployments.'
            )

      # ── Resolve BASE_URL ─────────────────────────────────────────────────────

      - name: Set BASE_URL
        run: |
          if [ "${{ github.event_name }}" = "deployment_status" ]; then
            echo "BASE_URL=${{ github.event.deployment_status.target_url }}" >> "$GITHUB_ENV"
          else
            echo "BASE_URL=${{ steps.get-url.outputs.url }}" >> "$GITHUB_ENV"
          fi

      # ── Vercel readiness check ────────────────────────────────────────────────
      # `deployment_status: success` fires the moment Vercel marks the
      # deployment ready, but the project's "Vercel" check on the commit
      # may still be propagating — and the URL routing / CDN layer is
      # often a few seconds behind that. Block here until every Vercel
      # check on this SHA has reached a successful conclusion before we
      # start curling the URL. This eliminates the recurring "wait
      # loop times out" failures whose only fix was re-running the job.
      - name: Wait for Vercel check on this commit to finish
        if: github.event_name == 'deployment_status'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.deployment.sha }}
          # Match every check Vercel publishes (e.g. "Vercel",
          # "Vercel — Preview — story-creator", future renames).
          check-regexp: '^Vercel.*'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success,skipped,neutral

      # Wait until the deployment URL returns 2xx WITH the bypass header.
      # A 401/403 means Vercel Deployment Protection is blocking — treat as
      # not ready, capture the response body so the log explains what the
      # platform is returning, and fail with a descriptive message.
      - name: Wait for deployment to be reachable
        id: wait
        env:
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Target URL: $BASE_URL"
          if [ -z "$BYPASS_SECRET" ]; then
            echo "::warning::VERCEL_AUTOMATION_BYPASS_SECRET is empty — requests without the bypass header will be blocked if Deployment Protection is enabled."
          fi
          # Single request with a generous overall budget. curl's own
          # --retry handles transient failures (5xx, timeouts, connection
          # refused) so we don't need a bash retry loop. `|| echo "000"`
          # keeps the script alive under `set -e` if curl still ends up
          # exhausting its retries.
          STATUS=$(curl -s -o /tmp/deploy-body -w "%{http_code}" \
            -H "x-vercel-protection-bypass: ${BYPASS_SECRET}" \
            -L --max-time 180 \
            --retry 5 --retry-delay 5 --retry-connrefused --retry-all-errors \
            "$BASE_URL" || echo "000")
          echo "HTTP $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Deployment is reachable (HTTP $STATUS)."
            echo "reachable=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "last_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "::error::Deployment was not reachable (HTTP $STATUS)."
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "::error::Vercel Deployment Protection is blocking the E2E runner."
            echo "::error::Confirm VERCEL_AUTOMATION_BYPASS_SECRET is set in repo Settings → Secrets → Actions, and that 'Protection Bypass for Automation' is enabled on the Vercel project."
            echo "::error::See: https://vercel.com/docs/security/deployment-protection/methods-to-bypass-deployment-protection"
          fi
          echo "--- response body (first 500 chars) ---"
          head -c 500 /tmp/deploy-body || true
          echo
          exit 1

      - name: Run Playwright E2E tests
        env:
          CI: 'true'
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npx playwright test --config=playwright.config.cjs

      - name: Comment failures on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            // Hidden marker so we can find and delete previous failure
            // comments posted by this workflow. Bots only — humans never
            // type this string.
            const MARKER = '<!-- e2e-failure-comment -->'
            const sha = context.payload.deployment?.sha || context.sha
            const deployUrl = context.payload.deployment_status?.target_url || process.env.BASE_URL || ''
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`

            // Find open PR associated with the deployed commit SHA
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            })
            const openPR = prs.find(pr => pr.state === 'open')
              || (context.payload.pull_request ? { number: context.payload.pull_request.number } : null)
            if (!openPR) {
              console.log(`No open PR found for commit ${sha} — skipping comment`)
              return
            }
            const prNumber = openPR.number

            // Parse Playwright JSON results for failed test details.
            // Suites can nest (file-suite → describe-suite → specs), so walk
            // the tree recursively, collecting full breadcrumb paths.
            let failedSection = ''
            const resultsPath = 'test-results/results.json'
            if (!fs.existsSync(resultsPath)) {
              failedSection = [
                '### ⚙️ Setup step failed — no tests ran',
                '',
                'The Playwright test runner never started. Most common causes:',
                '',
                '| Symptom | Fix |',
                '|---------|-----|',
                '| `HTTP 401` / `403` in job log | `VERCEL_AUTOMATION_BYPASS_SECRET` is missing or wrong in GitHub Secrets |',
                '| `HTTP 000` / curl error | Deployment URL unreachable / DNS not propagated yet |',
                '| Browser install error | Run `npx playwright install` in the workflow before tests |',
                '| No GitHub Deployment found | Confirm the Vercel GitHub integration creates GitHub Deployments |',
                '',
                '**Steps to fix the bypass secret:**',
                '1. Vercel → Project → Settings → Deployment Protection → copy the _Protection Bypass for Automation_ token',
                '2. GitHub repo → Settings → Secrets → Actions → update `VERCEL_AUTOMATION_BYPASS_SECRET`',
                '',
                '> Check the **"Wait for deployment to be reachable"** step in the [job log](' + runUrl + ') for the exact HTTP status.',
              ].join('\n')
            } else {
              try {
                const raw = fs.readFileSync(resultsPath, 'utf8')
                const report = JSON.parse(raw)
                const BAD_STATUSES = new Set(['failed', 'timedOut', 'interrupted'])
                // Strip ANSI escape codes (colour, dim, bold, etc.) that
                // Playwright embeds in error messages and call logs.
                const stripAnsi = s => s.replace(/\[[0-9;]*m/g, '')
                const failures = []

                // Walk suite tree, building a readable breadcrumb path per spec.
                const walk = (suite, crumbs = []) => {
                  const trail = suite.title ? [...crumbs, suite.title] : crumbs
                  for (const spec of (suite.specs || [])) {
                    const bad = (spec.tests || [])
                      .flatMap(t => t.results || [])
                      .filter(r => BAD_STATUSES.has(r.status))
                    if (!bad.length) continue
                    const worst = bad[0]
                    failures.push({
                      path: [...trail, spec.title].join(' › '),
                      status: worst.status,
                      duration: worst.duration ?? 0,
                      message: stripAnsi(worst.error?.message || worst.status),
                      stack: stripAnsi(worst.error?.stack || ''),
                    })
                  }
                  for (const child of (suite.suites || [])) walk(child, trail)
                }
                for (const suite of (report.suites || [])) walk(suite)

                if (failures.length === 0) {
                  failedSection = [
                    '### ⚙️ Setup step failed — no tests ran',
                    '',
                    '_Job failed but no individual test was marked as failed.',
                    'The wait/setup step most likely failed before Playwright started — check the [job log](' + runUrl + ')._',
                  ].join('\n')
                } else {
                  const icon = s => s === 'timedOut' ? '⏱️ timed out' : s === 'interrupted' ? '🚫 interrupted' : '❌ failed'
                  const blocks = failures.map(({ path, status, duration, message, stack }) => {
                    const secs = duration ? ` _(${(duration / 1000).toFixed(1)}s)_` : ''
                    // Full error message in a code block (capped at 800 chars)
                    const msgBlock = '```\n' + message.slice(0, 800) + (message.length > 800 ? '\n…(truncated)' : '') + '\n```'
                    // Stack trace in a collapsible block, strip redundant first line if dupe of message
                    const stackBody = stack.replace(/^.+\n/, '').trim()
                    const stackBlock = stackBody
                      ? '<details>\n<summary>Stack trace</summary>\n\n```\n' + stackBody.slice(0, 1500) + (stackBody.length > 1500 ? '\n…(truncated)' : '') + '\n```\n\n</details>'
                      : ''
                    return [`**\`${path}\`** — ${icon(status)}${secs}`, '', msgBlock, stackBlock].filter(Boolean).join('\n')
                  })
                  failedSection = `### ❌ ${failures.length} test(s) failed\n\n---\n\n` + blocks.join('\n\n---\n\n')
                }
              } catch (e) {
                failedSection = `_Could not parse \`test-results/results.json\`: ${e.message}_`
              }
            }

            const body = [
              MARKER,
              '## ❌ E2E Tests Failed',
              '',
              `**Deploy:** ${deployUrl}`,
              `**Run:** [Logs & artifacts](${runUrl})`,
              '',
              failedSection,
              '',
              '> 📎 Screenshots and videos are attached as artifacts on the Actions run.',
            ].join('\n')

            // Delete all previous failure comments from this workflow so
            // only the latest run's report remains on the PR.
            const stale = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            })
            for (const c of stale) {
              if (c.body && c.body.includes(MARKER)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                })
                console.log(`Deleted stale failure comment ${c.id}`)
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            })
            console.log(`Commented on PR #${prNumber}`)

      - name: Clear failure comments on PR when E2E passes
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- e2e-failure-comment -->'
            const sha = context.payload.deployment?.sha || context.sha

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            })
            const openPR = prs.find(pr => pr.state === 'open')
              || (context.payload.pull_request ? { number: context.payload.pull_request.number } : null)
            if (!openPR) {
              console.log(`No open PR found for commit ${sha} — nothing to clean up`)
              return
            }
            const prNumber = openPR.number

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            })
            let cleared = 0
            for (const c of comments) {
              if (c.body && c.body.includes(MARKER)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                })
                cleared++
              }
            }
            console.log(`E2E passed — removed ${cleared} stale failure comment(s) from PR #${prNumber}`)
