name: Playwright E2E Tests

# Runs automatically after every successful Vercel deployment.
# The deployment URL is taken directly from the deployment_status event,
# so tests always run against the exact build that was just deployed.
on:
  deployment_status:

jobs:
  e2e:
    name: Run E2E tests
    # Only run when Vercel reports a successful deployment
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run Playwright login tests
        working-directory: frontend
        env:
          CI: 'true'
          # URL of the deployment just finished by Vercel
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          # Optional: set in repo Settings → Secrets to bypass Vercel Deployment Protection
          # https://vercel.com/docs/security/deployment-protection/methods-to-bypass-deployment-protection
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npx playwright test --config=playwright.config.cjs --reporter=list

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test results (screenshots/videos) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_id }}
          path: frontend/test-results/
          retention-days: 7
