name: Playwright E2E Tests

# Runs automatically after every successful Vercel deployment.
# BASE_URL is taken from the deployment_status event — no hardcoded URL.
on:
  deployment_status:

jobs:
  e2e:
    name: Run E2E tests
    # Only run when Vercel reports a successful deployment
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout the deployed commit
        uses: actions/checkout@v4
        with:
          # Check out the exact commit that was deployed, not just HEAD
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      # Wait for the deployment URL to actually respond before running tests.
      # Vercel can mark a deployment "success" a few seconds before it's routable.
      - name: Wait for deployment to be reachable
        env:
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          echo "Waiting for $DEPLOY_URL ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
              "$DEPLOY_URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -lt 500 ] && [ "$STATUS" -ne 0 ]; then
              echo "Deployment is reachable."
              exit 0
            fi
            sleep 5
          done
          echo "Deployment did not become reachable in time." && exit 1

      - name: Run Playwright login tests
        working-directory: frontend
        env:
          CI: 'true'
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          # Set VERCEL_AUTOMATION_BYPASS_SECRET in repo Settings → Secrets
          # to bypass Vercel Deployment Protection on preview URLs.
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npx playwright test --config=playwright.config.cjs --reporter=list

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload screenshots and videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_id }}
          path: frontend/test-results/
          retention-days: 7
