name: Playwright E2E Tests

# Runs automatically after every successful Vercel deployment.
# BASE_URL is taken from the deployment_status event — no hardcoded URL.
#
# REQUIRED secret (repo Settings → Secrets and variables → Actions):
#   VERCEL_AUTOMATION_BYPASS_SECRET
#   → Vercel dashboard → Project → Settings → Deployment Protection
#     → Enable "Protection Bypass for Automation" → copy the secret
on:
  deployment_status:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  e2e:
    name: Run E2E tests
    # Only run on successful preview deployments — never on Production to avoid
    # polluting real user data. Vercel sets environment to "Production" for the
    # main branch and "Preview" for PR / branch deployments.
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment != 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout the deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      # Wait until the deployment URL returns 2xx WITH the bypass header.
      # A 401/403 means Vercel Deployment Protection is blocking — treat as
      # not ready, capture the response body so the log explains what the
      # platform is returning, and fail with a descriptive message.
      - name: Wait for deployment to be reachable
        id: wait
        env:
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Target URL: $DEPLOY_URL"
          if [ -z "$BYPASS_SECRET" ]; then
            echo "::warning::VERCEL_AUTOMATION_BYPASS_SECRET is empty — requests without the bypass header will be blocked if Deployment Protection is enabled."
          fi
          LAST_STATUS=0
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /tmp/deploy-body -w "%{http_code}" \
              -H "x-vercel-protection-bypass: ${BYPASS_SECRET}" \
              -L --max-time 10 \
              "$DEPLOY_URL")
            LAST_STATUS=$STATUS
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Deployment is reachable (HTTP $STATUS)."
              echo "reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5
          done
          echo "reachable=false" >> "$GITHUB_OUTPUT"
          echo "last_status=$LAST_STATUS" >> "$GITHUB_OUTPUT"
          echo "::error::Deployment was not reachable after 90 s (last HTTP $LAST_STATUS)."
          if [ "$LAST_STATUS" = "401" ] || [ "$LAST_STATUS" = "403" ]; then
            echo "::error::Vercel Deployment Protection is blocking the E2E runner."
            echo "::error::Confirm VERCEL_AUTOMATION_BYPASS_SECRET is set in repo Settings → Secrets → Actions, and that 'Protection Bypass for Automation' is enabled on the Vercel project."
            echo "::error::See: https://vercel.com/docs/security/deployment-protection/methods-to-bypass-deployment-protection"
          fi
          echo "--- response body (first 500 chars) ---"
          head -c 500 /tmp/deploy-body || true
          echo
          exit 1

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          CI: 'true'
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npx playwright test --config=playwright.config.cjs

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload screenshots and videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_id }}
          path: frontend/test-results/
          retention-days: 7

      - name: Comment failures on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            // Hidden marker so we can find and delete previous failure
            // comments posted by this workflow. Bots only — humans never
            // type this string.
            const MARKER = '<!-- e2e-failure-comment -->'
            const sha = context.payload.deployment?.sha || context.sha
            const deployUrl = context.payload.deployment_status?.target_url || ''
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`

            // Find open PR associated with the deployed commit SHA
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            })
            const openPR = prs.find(pr => pr.state === 'open')
            if (!openPR) {
              console.log(`No open PR found for commit ${sha} — skipping comment`)
              return
            }
            const prNumber = openPR.number

            // Parse Playwright JSON results for failed test details.
            // Suites can nest (file-suite → describe-suite → specs), so walk
            // the tree recursively instead of looking only two levels deep.
            let failedLines = ''
            const resultsPath = 'frontend/test-results/results.json'
            if (!fs.existsSync(resultsPath)) {
              failedLines = [
                '_No `test-results/results.json` was produced — the Playwright step likely did not run._',
                '_Common cause: the "Wait for deployment to be reachable" step failed (e.g. Vercel Deployment Protection is blocking). Check the job log for details._',
              ].join('\n\n')
            } else {
              try {
                const raw = fs.readFileSync(resultsPath, 'utf8')
                const report = JSON.parse(raw)
                const BAD_STATUSES = new Set(['failed', 'timedOut', 'interrupted'])
                const failures = []
                const walk = (suite) => {
                  for (const spec of (suite.specs || [])) {
                    const bad = (spec.tests || []).flatMap(t => t.results || []).filter(r => BAD_STATUSES.has(r.status))
                    if (!bad.length) continue
                    const worst = bad[0]
                    const label = worst.status === 'timedOut' ? '⏱ timeout' : '❌ failed'
                    const err = worst.error?.message?.split('\n')[0] || worst.status
                    failures.push(`| \`${spec.title}\` | ${label} | ${err.slice(0, 120)} |`)
                  }
                  for (const child of (suite.suites || [])) walk(child)
                }
                for (const suite of (report.suites || [])) walk(suite)
                failedLines = failures.length
                  ? `| Test | Status | Error |\n|------|--------|-------|\n${failures.join('\n')}`
                  : '_Job failed but no individual test was marked as failed — the wait/setup step likely failed. Check the job log._'
              } catch (e) {
                failedLines = `_Could not parse \`test-results/results.json\`: ${e.message}_`
              }
            }

            const body = [
              MARKER,
              '## ❌ E2E Tests Failed',
              '',
              `**Deploy:** ${deployUrl}`,
              `**Run:** [Logs & artifacts](${runUrl})`,
              '',
              '### Failed tests',
              failedLines,
              '',
              '> Screenshots and videos are attached as artifacts on the Actions run.',
            ].join('\n')

            // Delete all previous failure comments from this workflow so
            // only the latest run's report remains on the PR.
            const stale = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            })
            for (const c of stale) {
              if (c.body && c.body.includes(MARKER)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                })
                console.log(`Deleted stale failure comment ${c.id}`)
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            })
            console.log(`Commented on PR #${prNumber}`)

      - name: Clear failure comments on PR when E2E passes
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- e2e-failure-comment -->'
            const sha = context.payload.deployment?.sha || context.sha

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            })
            const openPR = prs.find(pr => pr.state === 'open')
            if (!openPR) {
              console.log(`No open PR found for commit ${sha} — nothing to clean up`)
              return
            }
            const prNumber = openPR.number

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            })
            let cleared = 0
            for (const c of comments) {
              if (c.body && c.body.includes(MARKER)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                })
                cleared++
              }
            }
            console.log(`E2E passed — removed ${cleared} stale failure comment(s) from PR #${prNumber}`)
